<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የይለፍ ቃል መቀየሪያ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 12px; }
        .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
        /* የጃንጎ ፎርም ሳጥኖች ከBootstrap ጋር እንዲዋሃዱ */
        p input {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
            margin-bottom: 15px;
        }
        p label {
            font-weight: 500;
            margin-bottom: 5px;
            color: #495057;
        }
        .helptext {
            display: block;
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: -10px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card">
        <div class="card-header bg-dark text-white p-3 text-center">
            <h5 class="m-0">🔐 የይለፍ ቃል መቀየሪያ ፎርም</h5>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4">ተመለስ</a>
                    <button type="submit" class="btn btn-primary px-4">ይለፍ ቃል ቀይር</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
