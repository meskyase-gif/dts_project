<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>አዲስ ደብዳቤ መመዝገቢያ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5" style="max-width: 600px;">
    <div class="card shadow p-4">
        <h3 class="text-center text-success mb-4">📝 አዲስ ደብዳቤ መመዝገቢያ ፎርም</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-flex justify-content-between mt-4">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">ተመለስ</a>
                <button type="submit" class="btn btn-success">መዝግብ (Save)</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
