<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <title>ደብዳቤ መከታተያ - መግቢያ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="card login-container p-4 shadow">
        <h3 class="text-center mb-4 text-primary">የደብዳቤ መከታተያ ሲስተም</h3>
        <h5 class="text-center mb-3">መግቢያ</h5>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label">የተጠቃሚ ስም (Username)</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">የይለፍ ቃል (Password)</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">ግባ</button>
        </form>
    </div>
</div>

</body>
</html>
